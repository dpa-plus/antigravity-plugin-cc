name: Bug report
description: Something in the plugin behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please run `/antigravity:setup` first and include its output below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: "Ran /antigravity:review and got …"
    validations:
      required: true
  - type: input
    id: agy-version
    attributes:
      label: agy version
      description: Output of `agy --version`
      placeholder: "1.0.9"
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "0.3.0"
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: /antigravity:setup output
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Redact anything private (paths, emails). The companion log lives under ~/.antigravity-cc/.
      render: text
