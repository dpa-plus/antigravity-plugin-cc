name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo and runs tests.
permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests (no external deps, no auth needed)
        run: node --test tests/*.test.mjs

  validate-manifests:
    name: validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate JSON manifests parse
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')); console.log('marketplace.json OK')"
          node -e "JSON.parse(require('fs').readFileSync('plugins/antigravity/.claude-plugin/plugin.json','utf8')); console.log('plugin.json OK')"
      - name: Check every command/agent/skill file has YAML frontmatter
        run: |
          fail=0
          for f in plugins/antigravity/commands/*.md plugins/antigravity/agents/*.md $(find plugins/antigravity/skills -name SKILL.md); do
            head -1 "$f" | grep -q '^---$' || { echo "MISSING frontmatter: $f"; fail=1; }
          done
          exit $fail
